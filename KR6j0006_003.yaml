body:
  text: 爾時婆誐鑁毗盧遮那佛告持金剛手佛子志心聽種子曼荼羅先觀阿字門轉生於嚩字乃至一切字而成曼荼羅印契曼荼羅轉此成幖幟餘相廣如經寶冠舉手印住於字門者事業速成就一七八曩莫三滿多沒馱喃阿上短曩莫三滿多沒馱喃娑上短曩莫三滿多嚩日羅二合赧嚩上短迦上佉誐伽左瑳惹酇吒姹拏荼跢他娜馱跛頗麼婆野囉攞嚩捨灑娑賀乞叉二合右此一轉皆上聲短呼歸命同前一七九阿引長娑引嚩引迦引佉誐引伽左引瑳引惹引酇吒引姹引拏引荼跢引他引娜引馱跛引頗麼婆野引囉引攞引嚩引捨引灑引娑引賀乞叉二合引右此一轉皆是去聲歸命同前一八暗上糝上鑁劍上欠上儼上紺上占上上染上摲鵮上𭧁喃上喃上湛上擔上探上淡布含二合上普含反上暮含反上補含反上焰上囕上藍上鑁上苫上釤上參上唅上吃釤二合其此載第二轉聲歸命同前一八一惡入索入嚩入腳却虐入伽入作入錯入𠺁入鈼入知角反入坼角反入搦入擇入𠶒入託入諾入鐸入博入泊入漠入薄入藥入𠸪入𡀩入縛鑠入嗦入索入矐入吃索二合此轉皆轉音入聲戴呼之一八二伊縊塢烏哩里𭉭狸曀愛污奧菩提心真言下同一八三仰娘拏曩莽發行真言𠵫穰儜曩忙補闕真言唅髯喃南鑁涅槃真言噱弱搦諾莫祕密主當知從初迦字輪轉生十二轉乃至吃叉字悉成法界體此等三昧道若住佛世尊菩薩救世者緣覺聲聞説摧害於諸過若諸天世人真言法教道如是勤勇者為利衆生故等正覺真言言名成立相如因陀羅宗諸義利成就有增加法句本名行相應若唵字吽字及與發磔迦或頡利等是佛頂名號若揭㗚佷拏佉陀耶畔闍訶娜摩羅也鉢吒也等類是奉教使者諸忿怒真言若有納摩字及莎嚩訶字是修三摩地寂行者幖相若有扇多字尾戍馱字等當知能滿足一切所希願此正覺佛子救世者真言若聲聞所説一一句安布是中辟支佛復有少差別謂三昧分異淨除於業生復次祕密主如來無量百千俱胝那庾多劫積集修行真實諦語四聖諦四念處四神足十如來力六波羅蜜七菩提寶四梵住十八佛不共法以要言之自願智力一切法界加持力隨順衆生如其種類開示真言教法謂阿字門一切諸法本不生故迦字門一切諸法離作業故佉字門一切諸法等虛空不可得故哦字門一切諸法行不可得故伽字門一切諸法一合相不可得故遮字門一切諸法離一切遷變故車字門一切諸法影像不可得故惹字門一切諸法生不可得故社字門一切諸法戰敵不可得故吒字門一切諸法慢不可得故姹字門一切諸法長養不可得故拏字門一切諸法怨對不可得故荼字門一切諸法執持不可得故多字門一切諸法如如不可得故他字門一切諸法住處不可得故娜字門一切諸法施不可得故馱字門一切諸法法界不可得故波字門一切諸法第一義諦不可得故頗字門一切諸法不堅如聚沫故麼字門一切諸法縛不可得故婆字門一切諸法有不可得故野字門一切諸法一切乘不可得故囉字門一切諸法離一切諸塵故攞字門一切諸法一切相不可得故嚩字門一切諸法語言道斷故捨字門一切諸法本性寂故沙字門一切諸法性鈍故娑字門一切諸法一切諦不可得故訶字門一切諸法因不可得故吃叉二合字門一切諸法無有盡故仰惹拏那麼等句於一切三昧自在速能成辦諸事業義利得具如來十號如大日尊而轉法輪品類相入常照世間十號具足伽陀曰一八四薩嚩怛他蘖妬一囉賀帝二三藐三母馱三尾儞也二合左囉拏三波曩四蘇上誐姤𡀔迦尾五婀拏怛囉二合補嚕灑娜弭野六娑囉體他以反舍娑多七禰嚩難惹麼弩史野南惹八母馱九婆誐鑁十爾時大日尊住降伏四魔金剛戲三昧説降伏四魔解脫彼六趣滿足一切智智金剛字句真言曰普通印一八五曩莫三滿多沒馱喃阿尾囉吽欠真言者圓壇先置於自體自足而至臍成大金剛輪從此而至心當思惟水輪水輪上火輪火輪上風輪次應念持地而圖衆形像廣如世間品真言修行者遍斂修多羅爾時金剛手升於大日尊身語意地法平等觀察彼未來諸衆生説大真言王羯磨印口授真言曰一八六曩莫三滿多沒馱喃一阿三麼波多二合達磨馱覩二誐底孕二合誐多南三薩嚩他引四暗引欠暗惡五糝索六唅鶴七㘕𡀩八鑁嚩急呼之九娑嚩二合賀引十心真言吽㘕𡀩賀羅二合鶴娑嚩二合賀十一心中心㘕𡀩娑嚩二合賀引十二才説真言已一切諸如來往於十方界各舒右手臂摩頂稱善哉佛子汝今已超升大日尊身語意地行説此真言王何以故佛子毗盧遮那佛應正等覺者本坐菩提座觀十二句法降伏於四魔於此法界生三處流出句破壞天魔軍逮得無邊智自在而説法汝今亦如是同於正遍知為衆所知識汝問一切智大日正覺尊最勝真言行當演説法教我往昔由是發覺妙菩提開示一切法令至於滅度現在十方界諸佛咸證知爾時金剛手請問大日尊決定聖天位祕密曼荼羅唯願婆誐鑁為我廣開演説是伽陀已爾時大日世尊入于等至三昧觀未來世諸衆生故安住定中即時國土地平如掌五寶間錯懸大寶蓋莊嚴門標衆色流蘇其相長廣寶鈴白拂名衣幡珮綺絢垂布而校飾之於八方隅建摩尼幢八功德水芬馥盈滿無量衆鳥鴛鴦鵝鵠出和雅音種種浴池時華雜樹敷榮間列芳茂嚴好八方合繫五寶瓔繩其地柔耎猶如綿纊觸踐之者皆受快樂無量樂器自然諧韻其聲微妙人所樂聞無量菩薩隨福所感宮室殿堂意生之座如來信解願力所生法界幖幟大蓮華王出現如來法界性身安住其中隨諸衆生種種性欲令得歡喜時彼如來一切支分無障閡力從十智力信解所生無量形色莊嚴之相無數百千俱胝那由他劫布施持戒忍辱精進禪定智慧諸度功德所資長身即時出現彼出現已於諸世界大衆會中發大音聲而説偈曰諸佛甚奇特權智不思議無阿賴耶慧含藏説諸法若解無所得諸法之法相彼無得而得得諸佛導師説如是音聲已還入如來不思議法性身即時世尊告執金剛祕密主言善男子聽內心漫荼羅彼身地即是法界自性真言密印加持而加持之本性清淨羯磨金剛所護持故淨除一切塵垢我人衆生壽者意生儒童株杌過患方壇四門西向通達周旋界道內現意生八葉華王抽莖敷蘂綵絢端妙其中如來一切世間最尊特身超身語意至於心地逮得殊勝悅意之果於彼東方寶幢如來南方開敷華王如來彼西方無量壽如來於彼北方鼓音如來彼東南方普賢菩薩東北方觀自在菩薩西南方妙吉祥童子彼西北方慈氏菩薩一切蘂中佛菩薩母六波羅蜜三昧眷屬而自莊嚴下列持明諸忿怒衆持金剛手密主菩薩以為其莖處于無盡大海之中地居天等其數無量而環繞之爾時行者為成三昧耶故應以意生香華燈明塗香種種肴膳而供養之即説伽陀曰真言者誠諦圖畫曼荼羅自身成大我囉字淨諸垢安住瑜伽座尋念諸如來頂授諸弟子阿字大空點智者傳妙華令散於自身為説內所見行人宗奉處此最上壇故應與三昧耶次陳八祕密智慧三昧合舒散地風輪如放于光焰此名寶幢佛本生威德印曼荼羅三角而具大光明皆住本尊形如尊獲悉地次明開敷華金剛不壞印準前威德印屈風加空上印如嚩字形曼荼相如字回有金剛光次明無量壽蓮華藏大印初印散火水地合空亦然月輪曼荼羅波頭華圍繞次明鼓音王萬德莊嚴印二地屈入掌餘相同華藏其壇如半月空點遍圍繞火方支分印二羽合如蓮二空屈並建普賢曼荼羅猶如迦羅捨滿月金剛繞伊舍方觀音準前支分印屈火餘如前曼荼如彩虹遍垂金剛幡涅里底神方法住妙吉祥蓮合火輪舒地空自相合曼荼如虛空中加二空點雜色間圍繞嚩庾阿逸多智定金剛掌更互而搖動迅疾曼荼羅形如大空相青點遍嚴之正覺甚深密出過言語道為大率覩波四處流出句止觀蓮未敷阿尾囉峯合雙佉依囉本二訶橫其端遍身布四明自處華胎上即時世尊從清淨藏三摩鉢底無盡語表正覺信解以一音聲四處流出祕密真言彼彼真言曰一八七曩莫三滿多沒馱南一㘕𡀩娑嚩二合賀歸命同上開敷鑁嚩入娑嚩二合賀蓮華糝索入娑嚩二合賀高德唅鶴娑嚩二合賀普賢暗噁娑嚩二合賀世尊沒馱達羅抳上二娑密㗚三合底末羅馱曩羯哩二合三馱囉野薩鑁四婆誐嚩底五阿上迦囉嚩底六三麼曳七娑嚩二合賀文殊阿吠娜尾泥娑嚩二合賀彌勒摩賀庾誐相應庾擬宜以反寧上二庾詣秫嚩二合哩三欠惹哩計四娑嚩二合賀曩莫薩嚩怛他引蘖底毗庾二合尾濕嚩二合目契毗藥二合薩嚩他阿阿引暗噁娑嚩二合賀引持珠當心上餘如蘇悉地一一諸真言作心意念誦出入息為二常第一相應異此而受持真言闕支分內與外相應我説有四種彼世間念誦有所緣相應住種子字句或心隨本尊故説有攀緣阿字布支分持滿三落叉普賢及文殊執金剛聖天現前而摩頂行者稽首禮速奉閼伽水意生香華鬘便得身清淨初字置於耳聰慧耳根淨阿字為字門三時隨意念能持於壽命長劫住世間若度於羅惹觀彼為賀字彼持鉢娜麼自持於商佉更互而授與即生歡喜心出入息為上常知出世心遠離於諸字自尊為一相無二無取著不壞意色像勿異於法則所説三落叉多種持真言乃至衆罪除真言者清淨如念誦數量勿異如是教囉字置頂會應放百光明百光遍照王真言曰一八八曩莫三滿多沒馱南暗金剛掌舒臂置頂時搖動金剛手請問真言行菩薩修行幾時月禁戒得終竟是時婆誐鑁善哉勤勇士汝問殊勝戒古佛所開演緣明所起戒住戒如正覺令得成悉地為利世間故等起自真實常住於等引修行戒當竟菩提心業果和合為一相遠離諸造作具戒如佛智異此非禁戒得諸法自在通達利衆生常修無著行等礫石衆寶乃至滿落叉所説真言教畢於時月等禁戒量終竟最初於金輪住大因陀羅常觀於阿字當結金剛印飲乳以資身行者一月滿能調出入息次於第二月嚴整水輪中輪圍成九重秋夕月光色嚩字也應結蓮華印而服醇淨水次於第三月勝妙火輪觀三角威焰鬘囉字也印結大慧刀噉不求之食燒滅一切罪而生身語意第四月風輪賀字也行者常服風結轉法輪印攝心以持誦金剛水輪觀阿嚩字也依住於瑜伽是為第五月遠離得非得行者無所著等同三菩提和合風火輪賀囉字也出過衆過患復一月持誦此名第六月亦捨利非利釋梵等天衆遠住而敬禮一切為守護人天藥草神持明諸靈仙翼侍隨教命羅剎七母神一切為障者見是處光明馳散如猛焰恭敬而遠之等正覺真子一切得自在調伏難降者如大執金剛饒益諸群生等同觀世音六月滿足已隨所願成就常當於自他悲愍而救護持念分限畢捧珠發大願加持陳五供悅意妙伽陀三奉閼伽水解界解脫法廣作初方便想歸贊捺囉然後處間靜依教入三昧常觀修多羅印砂思六念乃至俱胝數最後佛放光行者業障盡即同遍照尊加持句真言金剛掌隨明遍觸身一八九曩莫三滿多沒馱南一薩嚩他引二勝思孕反勝三怛𭋓二合怛𭋓二合四顒顒五達𭌇達𭌇六娑他二合跛野娑他二合跛野七沒馱娑底野二合嚩八達磨娑底野二合嚩九僧伽娑底野二合嚩十吽吽十一吠娜尾吠十二娑嚩二合賀加持堅固已云何阿闍梨具大真實行若於此教法解斯廣大義正覺大功德説名阿闍梨諸佛不出世此人即名佛持執金剛印所有諸字輪若在於支分當知住眉間吽字金剛句娑字在膺下是謂蓮華句阿字第一命嚩字名為水囉字名為火吽字名忿怒佉字同虛空所謂極空點知此最真實説名阿闍梨了知佛所説當行不死句想念本初字純白點嚴飾最勝百心明諸法本不生於中正觀察能破無明宮正覺諸世尊所説法如是佛子一心聽安布諸字門迦字在咽下佉字在哦上哦字以為頸伽字在喉中遮字為舌根車字在舌中惹字為舌端社字舌生處吒字以為脛吒字應知髀拏字説為腰荼字以安坐多字最後分他字應知腹娜字為二手馱字以為脅波字以為背頗字應知胸麼字為二肘婆字次臂下莽字住於心野字陰藏相囉字者為眼攞字為廣額縊伊在二眥塢烏為二脣翳藹為二耳污奧為二頰暗字菩提句噁字般涅槃知是一切法行者成正覺一切智資財常在於其中世號一切智是謂薩般若爾時毗盧遮那佛告執金剛祕密主言大德金剛手此法是如來祕密印最勝祕密不應輒授與人除已灌頂族性調柔精勤堅固發殊勝願恭敬師長念報恩德者內外清淨捨自身命而求法者我弟子幖相在家出家種姓殊勝其相青白或白色廣首長頸額廣平正其鼻修直面䩉圓滿端嚴相稱如是佛子應當殷勤而教授之若異此者犯三昧耶餘如本教説普願諸有情同生蓮華藏攝大軌一部三卷是慈覺智證宗睿三師之請來也但其本非無異而今所印刻者則慈覺大師本展轉傳寫舛錯頗多故以本經及廣大軌校定有其未決猥冠注之以俟後哲或為防慢法曹間有其亂脫文則就師承傍點示之併是要法寶久住耳時正德元年辛卯之夏武城靈雲寺沙門慧光識􅞣􅞣􅝝􅞣􅝩􅞣􅞣􅞣􅞣􅚽􅞣􅞣􅝩􅑈􅞣􅞣􅗭􅞣􅝝􅗗􅝩􅑈􅞣􅖱􅗭􅗭􅞣􅝩􅗭􅞣􅝩􅞣􅞣􅞣􅞣􅞣􅗭􅗗􅁰􅞣􅂴􅞣􅗭􅞣􅞣􅗭􅞣􅞣􅋌􅋌􅁤􅋌􅋌􅋌􅞻􅋌􅞣􅋌􅑐􅑈􅗯􅝝􅞣􅇋􅝝􅞩􅞣􅋌􅗕􅞣􅋌􅞣􅞣􅝝􅁤􅍉􅍋􅟅􅟅􅟅􅟅􅁤􅁤􅗭􅞻􅋌􅞣􅝝􅍉􅝝􅗭􅞣􅝝􅞣􅟓􅞣􅞣􅞣􅁤􅝝

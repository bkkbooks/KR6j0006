body:
  text: 大興善寺中天竺國三藏輸波迦羅奉詔譯爾時婆誐鑁毘盧遮那佛觀察諸大眾告執金剛手密主薩埵言有法同大日如來莊嚴具同法界幖幟菩薩摩訶薩由是嚴身故處於生死中巡歷於諸趣塵剎如來會以此大菩提計都而建立如來之幖幟諸天龍夜叉八部遙禮敬受教而奉行汝今極諦聽吾當演說之密主誠請已爾時婆誐鑁即便住於身無害力三昧由住斯定故說一切如來無能障閡身無等三力明即說明妃曰二五曩莫三滿多沒馱南一阿三迷二底哩二合三迷三三去摩曳引四娑嚩二合賀金剛祕密主明妃能示現一切如來地不越三法界地波羅蜜滿密印定慧手蓮合建二空額肩心喉頂印五誦明妃此一切諸佛救世之大印正覺三昧耶於此印而住次法界生印當住於囕字印明如前說次轉法輪印諦想執金剛風輪風種子印明如初會真言行菩薩從此眾三昧即入無生字住大菩提心觀身如薩埵色相碧頗梨住於羯磨輪普遍成焰鬘誦下真言王方作曼荼羅自肘雙為量異此非吉祥乞地偈如經白檀點為記香華普奉獻先持辦事明傳法阿闍梨方可次應取五色修多羅稽首一切佛大毘盧遮那親自作加持東方以為首對持修多羅至臍而在空漸次右旋轉如是南及西終竟於北方第二安立界亦從初方起憶念諸如來所行如上說右方及後方復周於勝方阿闍梨次迴依於涅哩底受學對持者漸次以南行從此右旋遶轉依於風方師位移本處而居於火方持真言行者復修如是法弟子在西南師居伊舍尼學者復旋繞轉依於火方師位移本處而住於風方如是真言者普作四方相漸次入其中三位以分之已表三分位地相普周遍復於一一分差別以為三是中最初分作業所行道其餘中後分聖天之住處應知其分齊誠心以慇重運布諸聖尊是諦阿闍梨正受造眾相均調善分別內心妙白蓮胎藏正均等藏中造一切悲生曼荼羅十六央俱梨過此是其量八葉正圓滿鬚蘂皆嚴好金剛之智印遍出諸葉間從此華臺中大日勝尊現金色具暉曜首持髮髻冠救世圓滿光離熱住三昧四智四行等八祕中宣說大日如來上三昧諸眷屬彼東應畫作一切遍知印三角蓮華上其色皆鮮白光焰遍圍繞皓潔普周遍峯銳向其下佛坐道樹下持此降四魔故號遍知印能具多功德生眾三昧王云云次於其北維導師諸佛母晃曜真金色縞素以為衣遍照猶日光正受住三昧佛母虛空眼真言曰二六曩莫三滿多沒馱南一誐誐曩嚩囉𠸪乞叉二合嬭二誐誐曩娑摩曳三薩嚩覩嗢誐二合哆四鼻入娑囉三婆吠五入嚩二合羅難引摩目佉曩六娑嚩二合賀定慧歸合掌風捻空加上其形如憩伽此大慧刀印一切佛所說能斷於諸見謂俱生身見真言曰二七曩莫三滿多沒馱南一摩賀朅誐尾囉惹自羅反下準二達麼讚引捺囉捨二合迦娑賀惹三薩迦野捺𭋺二合瑟致二合㕰曳二合諾入迦四怛他引蘖多阿地目訖底二合儞翼二合捨多五尾微曳反囉引誐達磨儞翼二合舍多吽六定慧虛心合屈風空絞之形如商佉等此名為勝願吉祥法螺印諸佛世之師菩薩救世者皆說無垢法至寂靜涅槃真言曰二八曩莫三滿多沒馱喃一暗定慧合舒散猶如前健吒地空各相持風火頭令合吉祥願蓮華諸佛救世者不壞金剛座覺悟名為佛菩提與佛子悉皆從此生真言曰二九曩莫三滿多沒馱喃一阿入二羽外為拳申火風如鉤地空各竪合形如跋折羅金剛大慧印能壞無智城曉寤睡眠者天人不能壞真言曰三曩莫三滿多嚩日羅二合赧吽定慧內成拳火空各竪合風屈持於火形由似寶珠此印摩訶印所謂如來頂適纔結作之即同於世尊真言曰三一曩莫三滿多沒馱引喃一吽吽慧手屈成拳風節置眉間此名豪相藏佛常滿其願以纔作此故即同人中勝真言曰三二曩莫三滿多沒馱喃一阿去急呼唅若入急呼次住瑜伽座定慧累臍間猶如持鉢相是名為釋迦牟尼大鉢印真言曰三三曩莫三滿多沒馱喃一婆上急呼前印舒慧手向上施無畏能施與一切眾生類無畏若結此大印名施無畏者真言曰三四曩莫三滿多沒馱喃一薩嚩他二爾娜爾娜三佩也那奢娜四娑嚩二合賀引定慧復如前慧垂下施願如是與願印世依之所說適纔結此者諸佛滿其願真言曰三五曩莫三滿多沒馱喃一嚩囉娜嚩日囉二合怛摩二合迦二娑嚩二合賀引慧拳舒風輪以毘俱胝形住於等引相以如是大印諸佛救世者恐怖諸障者隨意成悉地由結是印故大惡魔軍眾及餘諸障者馳散無可疑風頭置眉間真言曰三六曩莫三滿多沒馱喃一摩訶引摩羅嚩底丁以反二捺奢嚩路納婆二合吠摩訶引每怛哩野二合三毘庾二合訥蘖二合底丁以反四娑嚩二合賀引慧拳舒水火風地押空輪此名一切佛世依悲生眼想置於眼界智者成佛眼真言曰灌頂時此用開眼三七曩莫三滿多沒馱喃一誐誐曩嚩羅落乞叉二合儜二迦嚕儜摩耶三怛他引蘖多斫乞芻二合四娑嚩二合賀引定慧內成拳舒風頭圓合此勝願索印壞諸造惡者真言者結之能縛諸不善真言曰三八曩莫三滿多沒馱喃一係係摩訶引播奢二鉢羅二合娑勞涅哩野二合三薩埵馱睹四尾模訶迦五怛他引蘖多引地目乞底二合儞入佐多六娑嚩二合賀引定慧合成拳慧風屈如鉤即此名鉤印諸佛救世者召集於一切住於十地位菩提大心者及惡思眾生隨召皆赴集真言曰三九曩莫三滿多沒馱喃一阿去急呼薩嚩怛囉二合引鉢囉二合底丁以反訶帝二怛他引蘖黨矩奢三冒地折哩耶二合跛哩布羅迦四娑嚩二合賀引前印申火屈火風並如鉤是名如來心真言曰四曩莫三滿多沒馱喃一枳壤怒納婆二合嚩二娑嚩二合賀引前拳收火風申水如來臍即前風火水舒散如來腰二印各持明彼二真言曰腰或內縛拳二水竝申合如來臍真言四一曩莫三滿多沒馱喃一阿沒哩二合都納婆二合嚩二娑嚩二合賀引如來腰真言四二曩莫三滿多沒馱喃一怛他引蘖多三婆嚩二娑嚩二合賀引定慧虛心合風水屈入內火合空亦然地合令少屈此名如來藏真言曰四三曩莫薩嚩怛他引蘖帝毘也二合一㘕㘕𡀩𡀩二娑嚩二合賀引前印散舒水即名大結界次無堪忍印大力大護者即以前印相火鉤頭屈合舒風餘同前二印真言曰四四曩莫三滿多沒馱喃一麗嚕補哩尾矩哩尾矩麗二娑嚩二合賀引無堪忍大護真言曰四五曩莫薩嚩怛他引蘖帝弊毘耶反下同一薩嚩佩也尾引蘖帝弊二尾濕嚩二合目契弊三薩嚩他引四唅欠五囉入乞叉二合摩訶引摩麗六薩嚩怛他引蘖多奔抳也二合涅入佐帝七吽吽八怛囉二合吒怛囉二合吒九阿鉢囉底丁以反訶帝十娑嚩二合賀引次明普光印準前空入月風開如放光又以空心合二風持火側名如來甲印次明爾賀嚩準前如來甲空押二水甲爾賀嚩觸印并觸習真言語門虛心合風水屈相捻二空竝少屈地火令成峯或云地水屈風火令如峯二空開附彼五印四真言彼彼真言曰普光四六曩莫三滿多沒馱喃一入嚩二合引攞引摩里儞二怛他引蘖多㗚旨二合二娑嚩二合賀引如來甲四七曩莫三滿多沒馱喃一鉢囉二合戰拏二嚩日羅二合入嚩二合攞野三尾薩怖二合羅吽四如來舌四八曩莫三滿多沒馱喃一怛他引蘖多爾訶嚩二合二薩底也二合達摩鉢囉二合底瑟恥二合多三娑嚩二合賀引如來語四九曩莫三滿多沒馱喃一怛他引蘖多摩訶引嚩無名反吃怛囉二合二尾濕嚩二合枳惹二合曩摩護那也三娑嚩二合賀引次牙同語門風屈第三節入掌令相合辨說同於牙風輪移向上置火三節上二印真言曰五曩莫三滿多沒馱喃一怛他引蘖多能去瑟吒囉二合娑囉娑釳囉二合引三參鉢羅二合博迦四薩嚩怛他引蘖多五尾灑也參婆上嚩六娑嚩二合賀引如來辯說五一曩莫三滿多沒馱喃一阿振底也二合娜部二合多二路跛嚩引三摩哆上鉢囉二合引跛多二合尾輸上馱娑嚩二合囉四娑嚩二合賀引次明佛十力定慧虛心合地空屈入掌月內節相合念處同十力雙屈於空風上節令相合次陳開悟印前印空加水餘度竝申合普賢如意珠虛合風加火慈氏印同前屈風火輪下五印真言曰如來持十力五二曩莫三滿多沒馱喃一捺奢麼浪伽達囉二吽參髯三娑嚩二合賀引如來念處五三曩莫三滿多沒馱喃一怛他引蘖多娑沒哩二合底二薩怛嚩二合𠰘哆弊毘也反訥蘖二合多三誐誐曩三去摩引三摩四娑嚩二合賀引平等開悟五四曩莫三滿多沒馱喃一薩嚩達磨三摩哆鉢囉二合鉢多二合二怛他引蘖哆引弩蘖多三娑嚩二合賀引普賢如意珠五五曩莫三滿多沒馱喃一三滿多弩蘖多二尾囉惹達摩儞入惹多三摩訶引摩訶引四娑嚩二合賀引慈氏菩薩五六曩莫三滿多沒馱喃一阿爾單惹也二薩嚩薩怛嚩二合引捨夜弩蘖多三娑嚩二合賀引復於彼南方救世佛菩薩大德聖尊印號名滿眾願真哆摩尼寶住於白蓮上智拳風住眉前二普通印彼三真言曰一切菩薩五七曩莫三滿多沒馱喃一薩嚩他引二尾麼底引三尾枳囉拏四達麼馱覩涅翼二合惹多五三三訶六娑嚩二合賀引一切諸佛心五八曩莫三滿多沒馱喃一薩嚩沒馱冒上地薩怛嚩二合二紇哩二合三娜野引捺哩二合吠捨儞四曩莫薩嚩尾禰五娑嚩二合賀引毫相五九曩莫三滿多沒馱喃一嚩囉泥二嚩嚩鉢囉二合波多二合吽三娑嚩二合賀引次於其勝方蓮華大精進自在觀世音光色如皓月商佉軍那華微笑坐白蓮髻現無量壽彼右大名稱聖者多羅尊青白色相雜中年女人狀合掌持青蓮圓光靡不遍暉發猶淨金微笑鮮白衣次左毘俱胝手垂數珠鬘三目持髮髻身形如縞素圓光色無主黃赤白相入次得大勢至被服商佉色大悲蓮華手滋榮而未敷圍繞以圓光明妃住其側號持名稱者一切妙瓔珞莊嚴金色身執鮮妙華枝左持鉢胤遇次近聖多羅當觀白處尊髮冠襲純白鉢曇麼華手於聖者前作大力持明王晨朝日暉色白蓮以嚴身赫奕成焰鬘吼怒牙出現利爪獸王髻賀野吃哩嚩入身相之儀軌大精進眷屬八密次當陳十度仰開敷地空自相竝多羅內叉拳風針空前附毘俱胝風交大勢福智合猶如蓮未開白處同前印移空水入月馬頭即前印屈風空輪下相去如穬麥名稱奢摩他上舉風輪屈地藏同馬頭申水風餘拳彼彼真言曰觀音蓮華部上首六曩莫三滿多沒馱喃一薩嚩怛他引蘖多嚩路枳多二羯嚕儜摩野三羅羅羅吽惹四娑嚩二合賀多羅尊六一曩莫三滿多沒馱喃一多𭋺多𭋺抳二迦嚕拏納婆二合吠三娑嚩二合賀毘俱胝六二曩莫三滿多沒馱喃一薩嚩婆野怛羅二合散儞入二吽娑頗二合吒野三娑嚩二合賀得大勢至六三曩莫三滿多沒馱喃一三參賀引二薩他二合麼鉢囉二合跛多二合三髯髯娑急音索四娑嚩二合賀耶輸多羅六四曩莫三滿多沒馱喃一琰野戍馱囉野二娑嚩二合賀白處尊六五曩莫三滿多沒馱喃一怛他蘖多尾灑野二三婆吠三鉢娜麼二合摩履儞入四娑嚩二合賀何耶揭利婆六六曩莫三滿多沒馱喃一吽佉曩野畔惹二娑頗二合吒野三娑嚩二合賀地藏六七曩莫三滿多沒馱喃一賀賀賀素上怛弩二娑嚩二合賀已說初界域諸尊方位竟大心摩訶薩應往第三院因陀羅方中先安妙吉祥身相欝金色五佛髻冠頂猶如童子形左持青蓮華上表金剛印微笑坐白蓮妙相圓滿光周匝互暉映右光網童子種種妙瓔珞執網坐寶蓮而觀佛長子左無垢光尊左右五使者所謂髻設尼優婆髻設尼質多羅地慧請召五使者五種奉教者侍衛無勝智文殊智定手火合加水上風空如嚩字蹙合似青蓮
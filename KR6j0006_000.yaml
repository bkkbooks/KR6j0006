body:
  text: 刻密軌序夫欲長其流者不可以不深其淵源也欲久其家者不可以不固其柱礎也粵有吾祖弘法大師請來密部若干百軸則是東寺一家之柱礎南池兩流之淵源也所以先師約身勉強不舍晝夜誓心研核豈敢怠遑每下校閲之帷時肆講授之席專精純熟無復與倫平昔謂門徒曰今也運膺澆季人滋窳怯若干百軸孰能書寫所希壽諸梓以助弘通焉而聞檗山大藏印版既濟就撿密部則十得九我願粗滿何喜加之更可鍥者凡數十卷以厝諸懷嗚呼先師報命有涯未果斯志而既寂矣余雖不肖深悲在茲聿企剞劂事務遂其遺意云爾時正德元年龍次辛卯仲秋穀武城靈雲精舍沙門慧光謹序

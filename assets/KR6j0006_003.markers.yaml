  - {type: variant, offset: 4408, length: 115, content: 攝大軌一部三卷，是慈覺、智證、宗睿三師之請來也，但其本非無異。而今所印刻者，則慈覺大師本。展轉傳寫舛錯頗多，故以本經及廣大軌校定。有其未決，猥冠注之，以俟後哲。或為防慢法曹，間有其亂脫文，則就師承傍點示之。併是要法寶久住耳。時正德元年辛卯之夏武城靈雲寺沙門慧光識, 甲: '', 乙: ''}
